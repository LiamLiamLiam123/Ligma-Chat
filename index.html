<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ligma Chat</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#1a1a1a;
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  height:100vh;
}

h1 { margin:10px 0; color:#ff4757; }

#join {
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:10px;
}

#join input {
  padding:10px;
  border:none;
  border-radius:5px;
  background:#444;
  color:#fff;
  width:260px;
}

#join button {
  padding:10px 20px;
  border:none;
  border-radius:5px;
  background:#ff4757;
  color:#fff;
  cursor:pointer;
}

#chat {
  display:none;
  flex-direction:column;
  width:100%;
  max-width:520px;
  flex:1;
}

.top-bar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:6px 10px;
}

#users-btn {
  background:#333;
  color:#fff;
  border:none;
  border-radius:5px;
  padding:4px 8px;
  cursor:pointer;
}

#users-panel {
  display:none;
  background:#222;
  border-radius:6px;
  margin:0 10px 6px;
  padding:6px;
  font-size:0.85em;
}

#messages {
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:6px;
}

.message {
  max-width:70%;
  padding:8px 12px;
  border-radius:8px;
  word-break:break-word;
}

.self { align-self:flex-end; background:#ff4757; }
.other { align-self:flex-start; background:#2f2f2f; }
.system { align-self:center; background:#444; font-size:0.85em; }

#typing {
  height:18px;
  font-size:0.8em;
  color:#aaa;
  padding-left:10px;
}

form {
  display:flex;
  padding:10px;
}

form input {
  flex:1;
  padding:10px;
  border:none;
  border-radius:5px;
  background:#444;
  color:#fff;
}

form button {
  margin-left:6px;
  padding:10px 16px;
  border:none;
  border-radius:5px;
  background:#ff4757;
  color:#fff;
}
</style>
</head>

<body>
<h1>Ligma Chat 💬</h1>

<div id="join">
  <input id="username-input" placeholder="Username">
  <input id="room-input" placeholder="Room code">
  <button id="join-btn">Join</button>
</div>

<div id="chat">
  <div class="top-bar">
    <div id="room-title"></div>
    <button id="users-btn">👥</button>
  </div>

  <div id="users-panel">
    <b>Online</b>
    <ul id="users-list"></ul>
  </div>

  <div id="messages"></div>
  <div id="typing"></div>

  <form id="chat-form">
    <input id="message-input" autocomplete="off" placeholder="Message">
    <button>Send</button>
  </form>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  'https://bkcpyunpeyjxzcdgrhcl.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJrY3B5dW5wZXlqeHpjZGdyaGNsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjYyMDE2NzcsImV4cCI6MjA4MTc3NzY3N30.BBpncWn_U4zR40iTEDiypT7zFzhFx_VjjefxXVhOEyI'
)

const ADMIN_NAME = "Admin:Liam"

let room, username
let channel, adminChannel, presenceChannel
let muted = new Set()
let typingTimeout

const messagesDiv = document.getElementById('messages')
const typingDiv = document.getElementById('typing')
const usersBtn = document.getElementById('users-btn')
const usersPanel = document.getElementById('users-panel')
const usersList = document.getElementById('users-list')

usersBtn.onclick = () => {
  usersPanel.style.display =
    usersPanel.style.display === 'none' ? 'block' : 'none'
}

function addMessage(msg, cls) {
  const d = document.createElement('div')
  d.className = 'message ' + cls
  d.innerHTML = `<b>${msg.username}</b>: ${msg.message}`
  messagesDiv.appendChild(d)
  messagesDiv.scrollTop = messagesDiv.scrollHeight
}

function addSystem(text) {
  const d = document.createElement('div')
  d.className = 'message system'
  d.textContent = text
  messagesDiv.appendChild(d)
  messagesDiv.scrollTop = messagesDiv.scrollHeight
}

/* ===== JOIN ===== */
document.getElementById('join-btn').onclick = async () => {
  username = document.getElementById('username-input').value || 'Anon'
  room = document.getElementById('room-input').value

  document.getElementById('join').style.display = 'none'
  document.getElementById('chat').style.display = 'flex'
  document.getElementById('room-title').textContent = 'Room: ' + room

  /* MAIN CHANNEL */
  channel = supabase.channel('room-' + room)

  channel.on('broadcast', { event:'message' }, ({ payload }) => {
    if (payload.username !== username) {
      addMessage(payload, 'other')
    }
  })

  channel.on('broadcast', { event:'typing' }, ({ payload }) => {
    if (payload.username !== username) {
      typingDiv.textContent = payload.username + ' is typing...'
      clearTimeout(typingTimeout)
      typingTimeout = setTimeout(() => typingDiv.textContent = '', 1200)
    }
  })

  channel.subscribe()

  /* ADMIN CHANNEL */
  adminChannel = supabase.channel('admin-' + room)

  adminChannel.on('broadcast', { event:'kick' }, ({ payload }) => {
    if (payload.target === username) {
      alert('You were kicked by Admin')
      location.reload()
    }
  })

  adminChannel.on('broadcast', { event:'mute' }, ({ payload }) => {
    if (payload.target === username) {
      muted.add(username)
      addSystem('You were muted')
    }
  })

  adminChannel.on('broadcast', { event:'unmute' }, ({ payload }) => {
    if (payload.target === username) {
      muted.delete(username)
      addSystem('You were unmuted')
    }
  })

  adminChannel.subscribe()

  /* PRESENCE */
  presenceChannel = supabase.channel('presence-' + room, {
    config: { presence: { key: username } }
  })

  presenceChannel.on('presence', { event:'sync' }, () => {
    usersList.innerHTML = ''
    const state = presenceChannel.presenceState()
    Object.keys(state).forEach(u => {
      const li = document.createElement('li')
      li.textContent = u
      usersList.appendChild(li)
    })
  })

  presenceChannel.subscribe(async status => {
    if (status === 'SUBSCRIBED') {
      await presenceChannel.track({ username })
    }
  })
}

/* ===== TYPING ===== */
document.getElementById('message-input').addEventListener('input', () => {
  channel.send({
    type:'broadcast',
    event:'typing',
    payload:{ username }
  })
})

/* ===== SEND ===== */
document.getElementById('chat-form').onsubmit = e => {
  e.preventDefault()
  const input = e.target[0]
  const text = input.value.trim()
  input.value = ''

  // ADMIN COMMANDS
  if (text.startsWith('/') && username === ADMIN_NAME) {
    const parts = text.split(' ')
    const cmd = parts[0]
    const target = parts.slice(1).join(' ')

    if (!target) {
      addSystem('No target specified')
      return
    }

    if (cmd === '/kick') {
      adminChannel.send({ type:'broadcast', event:'kick', payload:{ target } })
      addSystem(`Admin kicked ${target}`)
      return
    }

    if (cmd === '/mute') {
      adminChannel.send({ type:'broadcast', event:'mute', payload:{ target } })
      addSystem(`Admin muted ${target}`)
      return
    }

    if (cmd === '/unmute') {
      adminChannel.send({ type:'broadcast', event:'unmute', payload:{ target } })
      addSystem(`Admin unmuted ${target}`)
      return
    }

    addSystem('Unknown admin command')
    return
  }

  if (muted.has(username)) {
    addSystem('You are muted')
    return
  }

  channel.send({
    type:'broadcast',
    event:'message',
    payload:{ username, message:text }
  })

  addMessage({ username, message:text }, 'self')
}
</script>
</body>
</html>
