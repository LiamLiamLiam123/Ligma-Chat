<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ligma Chat</title>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #1a1a1a;
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}
h1 { margin: 10px 0; color: #ff4757; flex-shrink: 0; }

#join {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 10px;
  width: 100%;
}
#join input {
  padding: 10px;
  border: none;
  border-radius: 5px;
  background: #444;
  color: #fff;
  width: 280px;
  font-size: 15px;
}
#join button {
  padding: 10px 28px;
  border: none;
  border-radius: 5px;
  background: #ff4757;
  color: #fff;
  cursor: pointer;
  font-size: 15px;
}
#join-err { color: #ff7d7d; font-size: 0.85em; display: none; min-height: 18px; }

#chat {
  display: none;
  flex-direction: column;
  width: 100%;
  max-width: 540px;
  flex: 1;
  min-height: 0;
}
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 12px;
  flex-shrink: 0;
  border-bottom: 1px solid #2a2a2a;
}
#room-title { font-weight: bold; font-size: 0.95em; color: #ccc; }
#conn-pill {
  font-size: 0.72em;
  padding: 2px 10px;
  border-radius: 10px;
  background: #333;
  color: #ffd97d;
}
#conn-pill.ok  { color: #7dffaa; }
#conn-pill.err { color: #ff7d7d; }

#users-bar {
  font-size: 0.75em;
  color: #777;
  padding: 3px 12px;
  flex-shrink: 0;
  min-height: 20px;
}

#messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 5px;
  min-height: 0;
}
.msg {
  max-width: 72%;
  padding: 8px 12px;
  border-radius: 10px;
  word-break: break-word;
  font-size: 0.95em;
  line-height: 1.4;
}
.msg .name { font-weight: bold; font-size: 0.78em; margin-bottom: 2px; opacity: 0.8; }
.self  { align-self: flex-end;   background: #ff4757; border-bottom-right-radius: 3px; }
.other { align-self: flex-start; background: #2f2f2f; border-bottom-left-radius: 3px; }
.sys   { align-self: center; color: #555; font-size: 0.78em; font-style: italic; padding: 1px 0; background: transparent; }

#typing {
  height: 18px;
  font-size: 0.78em;
  color: #666;
  padding: 0 12px;
  flex-shrink: 0;
  font-style: italic;
}
#input-row {
  display: flex;
  padding: 10px 12px;
  gap: 8px;
  flex-shrink: 0;
  border-top: 1px solid #2a2a2a;
}
#input-row input {
  flex: 1;
  padding: 10px 14px;
  border: none;
  border-radius: 20px;
  background: #333;
  color: #fff;
  font-size: 14px;
  outline: none;
}
#input-row input:disabled { opacity: 0.4; }
#input-row button {
  padding: 10px 18px;
  border: none;
  border-radius: 20px;
  background: #ff4757;
  color: #fff;
  cursor: pointer;
  font-size: 14px;
}
#input-row button:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>

<h1>Ligma Chat 💬</h1>

<div id="join">
  <input id="u-input" placeholder="Username" maxlength="24">
  <input id="r-input" placeholder="Room code" maxlength="32" value="general">
  <button id="join-btn">Join Room</button>
  <div id="join-err"></div>
</div>

<div id="chat">
  <div class="top-bar">
    <div id="room-title"></div>
    <div id="conn-pill">connecting…</div>
  </div>
  <div id="users-bar"></div>
  <div id="messages"></div>
  <div id="typing"></div>
  <div id="input-row">
    <input id="msg-input" autocomplete="off" placeholder="Message…" disabled maxlength="500">
    <button id="send-btn" disabled>Send</button>
  </div>
</div>

<script>
// PieSocket free public WebSocket demo
// Channel is namespaced by room code so different rooms don't mix
const PIESOCKET_KEY = 'oCdCMcMPQpbvNjUIzqtvF1d55jFflxHMiZgXAN98'
const PIESOCKET_CLUSTER = 'demo'

let ws, username, room
let typingTimer
let onlineUsers = {}   // { username: timestamp }
let typingUsers = {}   // { username: timestamp }
let reconnectCount = 0
let reconnectTimer
let intentionalClose = false

const joinDiv    = document.getElementById('join')
const chatDiv    = document.getElementById('chat')
const uInput     = document.getElementById('u-input')
const rInput     = document.getElementById('r-input')
const joinBtn    = document.getElementById('join-btn')
const joinErr    = document.getElementById('join-err')
const roomTitle  = document.getElementById('room-title')
const connPill   = document.getElementById('conn-pill')
const usersBar   = document.getElementById('users-bar')
const messagesDiv= document.getElementById('messages')
const typingDiv  = document.getElementById('typing')
const msgInput   = document.getElementById('msg-input')
const sendBtn    = document.getElementById('send-btn')

function setConn(ok) {
  connPill.textContent = ok ? 'connected' : 'reconnecting…'
  connPill.className   = ok ? 'ok' : 'err'
  msgInput.disabled    = !ok
  sendBtn.disabled     = !ok
}

function addMsg(u, text, cls) {
  const d = document.createElement('div')
  d.className = 'msg ' + cls
  if (cls !== 'sys') {
    const n = document.createElement('div')
    n.className = 'name'
    n.textContent = u
    d.appendChild(n)
  }
  const b = document.createElement('div')
  b.textContent = text
  d.appendChild(b)
  messagesDiv.appendChild(d)
  messagesDiv.scrollTop = messagesDiv.scrollHeight
}

function renderUsers() {
  const now = Date.now()
  const online = Object.entries(onlineUsers)
    .filter(([, ts]) => now - ts < 15000)
    .map(([u]) => u)
  usersBar.textContent = online.length ? '👥 ' + online.join(', ') : ''
}

function renderTyping() {
  const now = Date.now()
  const who = Object.entries(typingUsers)
    .filter(([u, ts]) => u !== username && now - ts < 3000)
    .map(([u]) => u)
  typingDiv.textContent = who.length
    ? who.join(', ') + (who.length === 1 ? ' is typing…' : ' are typing…')
    : ''
}

function send(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(obj))
  }
}

function connect() {
  // PieSocket channel name = "ligma-" + room (so rooms are isolated)
  const channelId = 'ligma-' + room
  const url = `wss://${PIESOCKET_CLUSTER}.piesocket.com/v3/${channelId}?api_key=${PIESOCKET_KEY}&notify_self=1`

  ws = new WebSocket(url)

  ws.onopen = () => {
    reconnectCount = 0
    setConn(true)
    // announce presence
    send({ type: 'join', u: username })
    // heartbeat every 8s to stay in online list
    clearInterval(window._heartbeat)
    window._heartbeat = setInterval(() => {
      send({ type: 'presence', u: username })
      renderUsers()
      renderTyping()
    }, 8000)
  }

  ws.onmessage = ({ data }) => {
    let msg
    try { msg = JSON.parse(data) } catch { return }

    // PieSocket wraps messages in a "data" field sometimes
    if (msg.data && typeof msg.data === 'string') {
      try { msg = JSON.parse(msg.data) } catch { return }
    } else if (msg.data && typeof msg.data === 'object') {
      msg = msg.data
    }

    if (!msg.type) return

    switch (msg.type) {
      case 'chat':
        if (msg.u !== username) addMsg(msg.u, msg.t, 'other')
        onlineUsers[msg.u] = Date.now()
        renderUsers()
        break
      case 'join':
        if (msg.u !== username) addMsg('', msg.u + ' joined', 'sys')
        onlineUsers[msg.u] = Date.now()
        renderUsers()
        // reply with our presence so they know we're here
        send({ type: 'presence', u: username })
        break
      case 'leave':
        addMsg('', msg.u + ' left', 'sys')
        delete onlineUsers[msg.u]
        renderUsers()
        break
      case 'presence':
        onlineUsers[msg.u] = Date.now()
        renderUsers()
        break
      case 'typing':
        if (msg.u !== username) {
          typingUsers[msg.u] = Date.now()
          renderTyping()
        }
        break
    }
  }

  ws.onclose = () => {
    setConn(false)
    clearInterval(window._heartbeat)
    if (!intentionalClose) scheduleReconnect()
  }

  ws.onerror = () => {
    setConn(false)
  }
}

function scheduleReconnect() {
  clearTimeout(reconnectTimer)
  const delay = Math.min(1500 * Math.pow(2, reconnectCount), 20000)
  reconnectCount++
  reconnectTimer = setTimeout(connect, delay)
}

// ── JOIN ──
joinBtn.onclick = () => {
  username = uInput.value.trim() || 'Anon'
  room     = rInput.value.trim().replace(/[^a-z0-9-_]/gi, '-').toLowerCase() || 'general'

  joinDiv.style.display = 'none'
  chatDiv.style.display = 'flex'
  roomTitle.textContent = '#' + room

  onlineUsers[username] = Date.now()
  connect()
  addMsg('', 'You joined #' + room, 'sys')
}

// ── TYPING ──
msgInput.addEventListener('input', () => {
  send({ type: 'typing', u: username })
  clearTimeout(typingTimer)
  typingTimer = setTimeout(() => {}, 2000)
})

// ── SEND ──
function sendMessage() {
  const text = msgInput.value.trim()
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return
  msgInput.value = ''
  clearTimeout(typingTimer)
  send({ type: 'chat', u: username, t: text })
  addMsg(username, text, 'self')
}

sendBtn.onclick = sendMessage
msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage() }
})

// ── LEAVE ──
window.addEventListener('beforeunload', () => {
  intentionalClose = true
  send({ type: 'leave', u: username })
  ws && ws.close()
})

uInput.focus()
</script>
</body>
</html>
