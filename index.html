<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ligma Chat</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: Arial, sans-serif;
  background: #1a1a1a;
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}
h1 { margin: 10px 0; color: #ff4757; flex-shrink: 0; }

#join {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 12px;
  width: 100%;
}
#join input {
  padding: 10px;
  border: none;
  border-radius: 5px;
  background: #444;
  color: #fff;
  width: 280px;
  font-size: 15px;
}
#join button {
  padding: 10px 28px;
  border: none;
  border-radius: 5px;
  background: #ff4757;
  color: #fff;
  cursor: pointer;
  font-size: 15px;
}
#join-err { color: #ff7d7d; font-size: 0.85em; min-height: 18px; }

#chat {
  display: none;
  flex-direction: column;
  width: 100%;
  max-width: 540px;
  flex: 1;
  min-height: 0;
}
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 12px;
  flex-shrink: 0;
  border-bottom: 1px solid #2a2a2a;
}
#room-title { font-weight: bold; font-size: 0.95em; color: #ccc; }
#conn-pill {
  font-size: 0.72em;
  padding: 2px 10px;
  border-radius: 10px;
  background: #333;
  color: #ffd97d;
}
#conn-pill.ok  { color: #7dffaa; }
#conn-pill.err { color: #ff7d7d; }

#users-bar {
  font-size: 0.75em;
  color: #777;
  padding: 3px 12px;
  flex-shrink: 0;
  min-height: 20px;
}
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 5px;
  min-height: 0;
}
.msg {
  max-width: 72%;
  padding: 8px 12px;
  border-radius: 10px;
  word-break: break-word;
  font-size: 0.95em;
  line-height: 1.4;
}
.msg .name { font-weight: bold; font-size: 0.78em; margin-bottom: 2px; opacity: 0.8; }
.self  { align-self: flex-end;   background: #ff4757; border-bottom-right-radius: 3px; }
.other { align-self: flex-start; background: #2f2f2f; border-bottom-left-radius: 3px; }
.sys   { align-self: center; color: #555; font-size: 0.78em; font-style: italic; background: transparent; }

#typing {
  height: 18px;
  font-size: 0.78em;
  color: #666;
  padding: 0 12px;
  flex-shrink: 0;
  font-style: italic;
}
#input-row {
  display: flex;
  padding: 10px 12px;
  gap: 8px;
  flex-shrink: 0;
  border-top: 1px solid #2a2a2a;
}
#input-row input {
  flex: 1;
  padding: 10px 14px;
  border: none;
  border-radius: 20px;
  background: #333;
  color: #fff;
  font-size: 14px;
  outline: none;
}
#input-row input:disabled { opacity: 0.4; }
#input-row button {
  padding: 10px 18px;
  border: none;
  border-radius: 20px;
  background: #ff4757;
  color: #fff;
  cursor: pointer;
  font-size: 14px;
}
#input-row button:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>

<h1>Ligma Chat 💬</h1>

<div id="join">
  <input id="u-input" placeholder="Username" maxlength="24">
  <input id="r-input" placeholder="Room code" maxlength="32" value="general">
  <button id="join-btn">Join Room</button>
  <div id="join-err"></div>
</div>

<div id="chat">
  <div class="top-bar">
    <div id="room-title"></div>
    <div id="conn-pill">connecting…</div>
  </div>
  <div id="users-bar"></div>
  <div id="messages"></div>
  <div id="typing"></div>
  <div id="input-row">
    <input id="msg-input" autocomplete="off" placeholder="Message…" disabled maxlength="500">
    <button id="send-btn" disabled>Send</button>
  </div>
</div>

<script>
const FB = 'https://ligma--chat-default-rtdb.firebaseio.com'

let username, room
let msgListener = null
let typingTimer
let presenceTimer

const joinDiv     = document.getElementById('join')
const chatDiv     = document.getElementById('chat')
const uInput      = document.getElementById('u-input')
const rInput      = document.getElementById('r-input')
const joinBtn     = document.getElementById('join-btn')
const joinErr     = document.getElementById('join-err')
const roomTitle   = document.getElementById('room-title')
const connPill    = document.getElementById('conn-pill')
const usersBar    = document.getElementById('users-bar')
const messagesDiv = document.getElementById('messages')
const typingDiv   = document.getElementById('typing')
const msgInput    = document.getElementById('msg-input')
const sendBtn     = document.getElementById('send-btn')

// ── Firebase REST helpers ──
const fb = (path) => `${FB}/${path}.json`

async function fbPost(path, data) {
  const r = await fetch(fb(path), { method: 'POST', body: JSON.stringify(data) })
  return r.json()
}
async function fbSet(path, data) {
  await fetch(fb(path), { method: 'PUT', body: JSON.stringify(data) })
}
async function fbDel(path) {
  await fetch(fb(path), { method: 'DELETE' })
}
async function fbGet(path) {
  const r = await fetch(fb(path))
  return r.json()
}

// ── SSE real-time listener ──
function fbListen(path, cb) {
  const es = new EventSource(fb(path))
  es.addEventListener('put',   e => { try { cb(JSON.parse(e.data)) } catch {} })
  es.addEventListener('patch', e => { try { cb(JSON.parse(e.data)) } catch {} })
  es.onopen  = () => { connPill.textContent = 'connected'; connPill.className = 'ok'; msgInput.disabled = false; sendBtn.disabled = false }
  es.onerror = () => { connPill.textContent = 'reconnecting…'; connPill.className = 'err'; msgInput.disabled = true; sendBtn.disabled = true }
  return es
}

// ── UI helpers ──
const seen = new Set()
function addMsg(u, text, cls, id) {
  if (id && seen.has(id)) return
  if (id) seen.add(id)
  const d = document.createElement('div')
  d.className = 'msg ' + cls
  if (cls !== 'sys') {
    const n = document.createElement('div')
    n.className = 'name'
    n.textContent = u
    d.appendChild(n)
  }
  const b = document.createElement('div')
  b.textContent = text
  d.appendChild(b)
  messagesDiv.appendChild(d)
  messagesDiv.scrollTop = messagesDiv.scrollHeight
}

async function renderPresence() {
  const data = await fbGet(`rooms/${room}/presence`)
  if (!data) return
  const now = Date.now()
  const online = Object.values(data)
    .filter(u => now - u.ts < 15000)
    .map(u => u.name)
  usersBar.textContent = online.length ? '👥 ' + online.join(', ') : ''
}

async function renderTyping() {
  const data = await fbGet(`rooms/${room}/typing`)
  if (!data) { typingDiv.textContent = ''; return }
  const now = Date.now()
  const who = Object.entries(data)
    .filter(([u, ts]) => u !== username && now - ts < 3000)
    .map(([u]) => u)
  typingDiv.textContent = who.length
    ? who.join(', ') + (who.length === 1 ? ' is typing…' : ' are typing…')
    : ''
}

// ── JOIN ──
joinBtn.onclick = async () => {
  username  = uInput.value.trim() || 'Anon'
  room      = rInput.value.trim().replace(/[^a-z0-9_-]/gi, '-').toLowerCase() || 'general'

  joinBtn.disabled    = true
  joinBtn.textContent = 'Connecting…'
  joinErr.textContent = ''

  // Quick reachability check
  try {
    const r = await fetch(fb(`rooms/${room}/ping`))
    if (!r.ok) throw new Error('HTTP ' + r.status)
  } catch (e) {
    joinErr.textContent = 'Cannot reach Firebase: ' + e.message
    joinBtn.disabled    = false
    joinBtn.textContent = 'Join Room'
    return
  }

  // Switch screens
  joinDiv.style.display = 'none'
  chatDiv.style.display = 'flex'
  roomTitle.textContent = '#' + room

  // Load existing messages first
  const existing = await fbGet(`rooms/${room}/messages`)
  if (existing) {
    Object.entries(existing)
      .sort((a, b) => (a[1].ts || 0) - (b[1].ts || 0))
      .forEach(([id, m]) => addMsg(m.u, m.t, m.u === username ? 'self' : 'other', id))
  }

  // Listen for new messages via SSE
  msgListener = fbListen(`rooms/${room}/messages`, ({ data }) => {
    if (!data) return
    const entries = typeof data === 'object' && !data.u
      ? Object.entries(data)
      : [[null, data]]
    entries.forEach(([id, m]) => {
      if (m && m.u && m.t) addMsg(m.u, m.t, m.u === username ? 'self' : 'other', id)
    })
  })

  // Presence heartbeat
  const updatePresence = () => fbSet(`rooms/${room}/presence/${username}`, { name: username, ts: Date.now() })
  await updatePresence()
  renderPresence()
  presenceTimer = setInterval(() => { updatePresence(); renderPresence(); renderTyping() }, 8000)

  // Typing listener via SSE
  fbListen(`rooms/${room}/typing`, () => renderTyping())

  addMsg('', 'You joined #' + room, 'sys')
  msgInput.focus()
}

// ── TYPING ──
msgInput.addEventListener('input', async () => {
  await fbSet(`rooms/${room}/typing/${username}`, Date.now())
  clearTimeout(typingTimer)
  typingTimer = setTimeout(() => fbDel(`rooms/${room}/typing/${username}`), 2500)
})

// ── SEND ──
async function sendMessage() {
  const text = msgInput.value.trim()
  if (!text) return
  msgInput.value = ''
  clearTimeout(typingTimer)
  fbDel(`rooms/${room}/typing/${username}`)
  await fbPost(`rooms/${room}/messages`, { u: username, t: text, ts: Date.now() })
}

sendBtn.onclick = sendMessage
msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage() }
})

// ── LEAVE ──
window.addEventListener('beforeunload', () => {
  fbDel(`rooms/${room}/presence/${username}`)
  fbDel(`rooms/${room}/typing/${username}`)
  clearInterval(presenceTimer)
  msgListener?.close()
})

uInput.focus()
</script>
</body>
</html>
