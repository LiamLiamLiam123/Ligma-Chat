<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ligma Chat</title>
<style>
body { margin:0; font-family: Arial, sans-serif; background:#1a1a1a; color:#fff; display:flex; flex-direction:column; align-items:center; height:100vh; }
h1 { text-align:center; margin:10px 0; color:#ff4757; }
#join { display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1; width:100%; }
#chat { display:none; flex-direction:column; width:100%; max-width:500px; flex:1; }
#room-title { padding:10px 20px; font-weight:bold; font-size:1.2em; text-align:center; color:#ff4757; }
#messages { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:6px; padding:10px 20px; }
.message { max-width:70%; padding:8px 12px; border-radius:8px; word-break:break-word; display:inline-block; }
.message.self { background:#ff4757; color:#fff; align-self:flex-end; text-align:right; }
.message.other { background:#2f2f2f; color:#fff; align-self:flex-start; text-align:left; }
input { padding:10px; border:none; border-radius:5px; background:#444; color:#fff; margin-bottom:10px; width:100%; max-width:300px; }
button { padding:10px 20px; border:none; border-radius:5px; background:#ff4757; color:#fff; cursor:pointer; }
button:hover { background:#ff6b81; }
form { display:flex; width:100%; max-width:500px; margin-bottom:10px; }
form input { flex:1; margin-right:5px; }
.timestamp { font-size:0.7em; color:#aaa; display:block; margin-top:2px; }
</style>
</head>
<body>
<h1>Ligma Chat 💬</h1>

<div id="join">
<input id="username-input" placeholder="Enter username">
<input id="room-input" placeholder="Enter room code">
<button id="join-btn">Join Room</button>
</div>

<div id="chat">
<div id="room-title"></div>
<div id="messages"></div>
<form id="chat-form">
<input id="message-input" placeholder="Type message..." autocomplete="off">
<button type="submit">Send</button>
</form>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const SUPABASE_URL = 'https://bkcpyunpeyjxzcdgrhcl.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJrY3B5dW5wZXlqeHpjZGdyaGNsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjYyMDE2NzcsImV4cCI6MjA4MTc3NzY3N30.BBpncWn_U4zR40iTEDiypT7zFzhFx_VjjefxXVhOEyI';
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const joinDiv = document.getElementById('join');
const chatDiv = document.getElementById('chat');
const joinBtn = document.getElementById('join-btn');
const usernameInput = document.getElementById('username-input');
const roomInput = document.getElementById('room-input');
const form = document.getElementById('chat-form');
const input = document.getElementById('message-input');
const messagesDiv = document.getElementById('messages');
const roomTitle = document.getElementById('room-title');

let room = '';
let username = '';
let color = '';
let subscription = null;
let lastFetched = null;

// Random color for user
function getRandomColor() {
    const letters = '0123456789ABCDEF';
    let c = '#';
    for(let i=0;i<6;i++) c += letters[Math.floor(Math.random()*16)];
    return c;
}

// Add message to chat
function addMessage({ username: msgUser, color: msgColor, message, created_at }) {
    const div = document.createElement('div');
    div.classList.add('message');
    div.classList.add(msgUser === username ? 'self' : 'other');
    div.innerHTML = `<strong style="color:${msgColor}">${msgUser}</strong>: ${message} <span class="timestamp">${created_at ? new Date(created_at).toLocaleTimeString() : ""}</span>`;
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

// Fetch new messages periodically
async function fetchNewMessages() {
    let query = supabase.from('messages').select('*').eq('room_code', room).order('created_at', { ascending: true });
    if(lastFetched) query = query.gt('created_at', lastFetched);

    const { data, error } = await query;
    if(error) return console.error(error);

    data.forEach(msg => {
        addMessage(msg);
        lastFetched = msg.created_at;
    });
}

// Subscribe to messages via Supabase Realtime
async function subscribeToRoom(roomCode) {
    if(subscription) await supabase.removeChannel(subscription);

    subscription = supabase.channel(`room-${roomCode}`)
        .on('postgres_changes', {
            event:'INSERT', schema:'public', table:'messages', filter:`room_code=eq.${roomCode}`
        }, payload => {
            if(payload.new.username !== username) addMessage(payload.new);
        })
        .subscribe((status) => {
            if(status==='SUBSCRIBED') console.log('Realtime active for room', roomCode);
        });
}

// Join room
joinBtn.addEventListener('click', async () => {
    username = usernameInput.value.trim() || 'Anonymous';
    room = roomInput.value.trim();
    if(!room) return;
    color = getRandomColor();

    joinDiv.style.display = 'none';
    chatDiv.style.display = 'flex';
    roomTitle.textContent = `Room: ${room}`;

    // Load all previous messages
    const { data } = await supabase.from('messages').select('*').eq('room_code', room).order('created_at', { ascending:true });
    data.forEach(msg => addMessage(msg));
    if(data.length > 0) lastFetched = data[data.length-1].created_at;

    // Start realtime subscription
    subscribeToRoom(room);

    // Start background polling every 2 seconds
    setInterval(fetchNewMessages, 2000);
});

// Send message
form.addEventListener('submit', async e => {
    e.preventDefault();
    if(!input.value) return;

    const messageText = input.value;
    input.value = '';

    // Insert and display immediately
    const { data, error } = await supabase.from('messages').insert([
        { room_code: room, username, color, message: messageText }
    ]).select();

    if(error) { console.error(error); return; }
    if(data && data.length > 0) addMessage(data[0]);
});
</script>
</body>
</html>
