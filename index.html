<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ligma Chat</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#1a1a1a;
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  height:100vh;
}

h1 {
  margin:10px 0;
  color:#ff4757;
}

#join {
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

#chat {
  display:none;
  flex-direction:column;
  width:100%;
  max-width:520px;
  flex:1;
}

.top-bar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:6px 10px;
}

#room-title {
  color:#ff4757;
  font-weight:bold;
}

#users-btn {
  background:#333;
  color:#fff;
  border:none;
  border-radius:5px;
  padding:4px 8px;
  cursor:pointer;
}

#users-panel {
  display:none;
  background:#222;
  border-radius:6px;
  margin:0 10px 6px;
  padding:6px;
  font-size:0.85em;
}

#users-panel ul {
  list-style:none;
  padding:0;
  margin:6px 0 0;
}

#messages {
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:6px;
}

.message {
  max-width:70%;
  padding:8px 12px;
  border-radius:8px;
  word-break:break-word;
}

.self {
  align-self:flex-end;
  background:#ff4757;
}

.other {
  align-self:flex-start;
  background:#2f2f2f;
}

#typing {
  height:18px;
  font-size:0.8em;
  color:#aaa;
  padding-left:10px;
}

form {
  display:flex;
  padding:10px;
}

form input {
  flex:1;
  padding:10px;
  border:none;
  border-radius:5px;
  background:#444;
  color:#fff;
}

form button {
  margin-left:6px;
  padding:10px 16px;
  border:none;
  border-radius:5px;
  background:#ff4757;
  color:#fff;
  cursor:pointer;
}
</style>
</head>

<body>
<h1>Ligma Chat 💬</h1>

<div id="join">
  <input id="username-input" placeholder="Username">
  <input id="room-input" placeholder="Room code">
  <button id="join-btn">Join</button>
</div>

<div id="chat">
  <div class="top-bar">
    <div id="room-title"></div>
    <button id="users-btn">👥</button>
  </div>

  <div id="users-panel">
    <b>Online</b>
    <ul id="users-list"></ul>
  </div>

  <div id="messages"></div>
  <div id="typing"></div>

  <form id="chat-form">
    <input id="message-input" autocomplete="off" placeholder="Message">
    <button>Send</button>
  </form>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  'https://bkcpyunpeyjxzcdgrhcl.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJrY3B5dW5wZXlqeHpjZGdyaGNsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjYyMDE2NzcsImV4cCI6MjA4MTc3NzY3N30.BBpncWn_U4zR40iTEDiypT7zFzhFx_VjjefxXVhOEyI'
)

/* ===== STATE ===== */
let room, username, color
let subscription
let lastFetched = null
let typingTimeout
let presenceChannel

/* ===== ELEMENTS ===== */
const joinDiv = document.getElementById('join')
const chatDiv = document.getElementById('chat')
const messagesDiv = document.getElementById('messages')
const typingDiv = document.getElementById('typing')
const usersBtn = document.getElementById('users-btn')
const usersPanel = document.getElementById('users-panel')
const usersList = document.getElementById('users-list')

usersBtn.onclick = () => {
  usersPanel.style.display =
    usersPanel.style.display === 'none' ? 'block' : 'none'
}

/* ===== HELPERS ===== */
function randColor() {
  return '#' + Math.floor(Math.random()*16777215).toString(16)
}

function addMessage(msg) {
  const d = document.createElement('div')
  d.className = 'message ' + (msg.username === username ? 'self' : 'other')
  d.innerHTML = `<b>${msg.username}</b>: ${msg.message}`
  messagesDiv.appendChild(d)

  messagesDiv.scrollTo({
    top: messagesDiv.scrollHeight,
    behavior:'smooth'
  })
}

/* ===== MESSAGE FETCH (UNCHANGED) ===== */
async function fetchNewMessages() {
  let q = supabase.from('messages')
    .select('*')
    .eq('room_code', room)
    .order('created_at', { ascending:true })

  if(lastFetched) q = q.gt('created_at', lastFetched)

  const { data } = await q
  data.forEach(m => {
    addMessage(m)
    lastFetched = m.created_at
  })
}

async function subscribeToRoom(r) {
  if(subscription) await supabase.removeChannel(subscription)

  subscription = supabase.channel('room-' + r)
    .on('postgres_changes', {
      event:'INSERT',
      schema:'public',
      table:'messages',
      filter:`room_code=eq.${r}`
    }, p => {
      if(p.new.username !== username) addMessage(p.new)
    })
    .subscribe()
}

/* ===== TYPING ===== */
function sendTyping() {
  supabase.channel('typing-' + room).send({
    type:'broadcast',
    event:'typing',
    payload:{ username }
  })
}

supabase.channel('typing-' + room)
  .on('broadcast', { event:'typing' }, ({ payload }) => {
    if(payload.username !== username) {
      typingDiv.textContent = payload.username + ' is typing...'
      clearTimeout(typingTimeout)
      typingTimeout = setTimeout(() => typingDiv.textContent = '', 1200)
    }
  }).subscribe()

/* ===== PRESENCE (ONLINE USERS) ===== */
function setupPresence() {
  presenceChannel = supabase.channel('presence-' + room, {
    config:{ presence:{ key: username } }
  })

  presenceChannel.on('presence', { event:'sync' }, () => {
    usersList.innerHTML = ''
    const state = presenceChannel.presenceState()
    Object.keys(state).forEach(u => {
      const li = document.createElement('li')
      li.textContent = u
      usersList.appendChild(li)
    })
  })

  presenceChannel.subscribe(async status => {
    if(status === 'SUBSCRIBED') {
      await presenceChannel.track({ username })
    }
  })
}

/* ===== JOIN ===== */
document.getElementById('join-btn').onclick = async () => {
  username = document.getElementById('username-input').value || 'Anon'
  room = document.getElementById('room-input').value
  color = randColor()

  joinDiv.style.display='none'
  chatDiv.style.display='flex'
  document.getElementById('room-title').textContent = 'Room: ' + room

  const { data } = await supabase.from('messages')
    .select('*')
    .eq('room_code', room)
    .order('created_at', { ascending:true })

  data.forEach(addMessage)
  if(data.length) lastFetched = data[data.length-1].created_at

  subscribeToRoom(room)
  setupPresence()
  setInterval(fetchNewMessages, 2000)
}

/* ===== SEND ===== */
document.getElementById('message-input')
  .addEventListener('input', sendTyping)

document.getElementById('chat-form').onsubmit = async e => {
  e.preventDefault()
  const text = e.target[0].value
  e.target[0].value=''

  const { data } = await supabase.from('messages').insert([{
    room_code:room,
    username,
    color,
    message:text
  }]).select()

  addMessage(data[0])
}
</script>
</body>
</html>
