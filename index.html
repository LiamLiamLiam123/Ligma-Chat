<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ligma Chat</title>
<style>
body { font-family: Arial, sans-serif; background: #1a1a1a; color: #fff; display: flex; flex-direction: column; height: 100vh; margin: 0; }
h1 { text-align: center; margin: 10px 0; color: #ff4757; }
#join, #chat { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; }
#messages { flex: 1; overflow-y: auto; padding: 10px; list-style: none; margin: 0; width: 100%; max-width: 500px; }
#messages li { padding: 8px 12px; margin-bottom: 6px; background: #2f2f2f; border-radius: 8px; word-break: break-word; }
input { padding: 10px; border: none; border-radius: 5px; background: #444; color: #fff; margin-bottom: 10px; width: 100%; max-width: 300px; }
button { padding: 10px 20px; border: none; border-radius: 5px; background: #ff4757; color: #fff; cursor: pointer; }
button:hover { background: #ff6b81; }
form { display: flex; width: 100%; max-width: 500px; }
form input { flex: 1; margin-right: 5px; }
.timestamp { font-size: 0.7em; color: #aaa; margin-left: 5px; }
</style>
</head>
<body>
<h1>Ligma Chat 💬</h1>

<div id="join">
<input id="username-input" placeholder="Enter your username" />
<input id="room-input" placeholder="Enter room code" />
<button id="join-btn">Join Room</button>
</div>

<div id="chat" style="display:none; flex-direction: column; flex:1; width:100%; align-items:center;">
<ul id="messages"></ul>
<form id="chat-form">
<input id="message-input" autocomplete="off" placeholder="Type your Ligma message..." />
<button type="submit">Send</button>
</form>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

// Supabase config
const SUPABASE_URL = 'https://bkcpyunpeyjxzcdgrhcl.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJrY3B5dW5wZXlqeHpjZGdyaGNsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjYyMDE2NzcsImV4cCI6MjA4MTc3NzY3N30.BBpncWn_U4zR40iTEDiypT7zFzhFx_VjjefxXVhOEyI';
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// DOM elements
const joinDiv = document.getElementById('join');
const chatDiv = document.getElementById('chat');
const joinBtn = document.getElementById('join-btn');
const usernameInput = document.getElementById('username-input');
const roomInput = document.getElementById('room-input');
const form = document.getElementById('chat-form');
const input = document.getElementById('message-input');
const messages = document.getElementById('messages');

let room = '';
let username = '';
let color = '';
let messageSubscription = null;

// Random color for usernames
function getRandomColor() {
    const letters = '0123456789ABCDEF';
    let c = '#';
    for (let i=0;i<6;i++) c += letters[Math.floor(Math.random()*16)];
    return c;
}

// Join room
joinBtn.addEventListener('click', async () => {
    const name = usernameInput.value.trim() || 'Anonymous';
    const code = roomInput.value.trim();
    if(!code) return;

    username = name;
    room = code;
    color = getRandomColor();

    joinDiv.style.display = 'none';
    chatDiv.style.display = 'flex';
    addSystemMessage(`Joined room: ${room}`);

    // Load previous messages
    const { data } = await supabase
        .from('messages')
        .select('*')
        .eq('room_code', room)
        .order('created_at', { ascending: true });
    data.forEach(msg => addMessage(msg));

    // Unsubscribe old subscription if exists
    if(messageSubscription) {
        supabase.removeChannel(messageSubscription);
    }

    // Subscribe to new messages for this room (real-time)
    messageSubscription = supabase
      .channel('room-' + room)
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `room_code=eq.${room}` }, payload => {
        addMessage(payload.new);
      })
      .subscribe();
});

// Send message
form.addEventListener('submit', async e => {
    e.preventDefault();
    if(!input.value) return;
    const message = input.value;
    input.value = '';
    await supabase.from('messages').insert([
        { room_code: room, username, color, message }
    ]);
});

// Display message
function addMessage({ username, color, message, created_at }) {
    const li = document.createElement('li');
    const time = created_at ? new Date(created_at).toLocaleTimeString() : '';
    li.innerHTML = `<strong style="color:${color}">${username}</strong>: ${message} <span class="timestamp">${time}</span>`;
    messages.appendChild(li);
    messages.scrollTop = messages.scrollHeight;
}

// System message
function addSystemMessage(msg) {
    const li = document.createElement('li');
    li.style.fontStyle = 'italic';
    li.style.textAlign = 'center';
    li.style.background = '#444';
    li.textContent = msg;
    messages.appendChild(li);
}
</script>
</body>
</html>
