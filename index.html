<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ligma Chat</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: Arial, sans-serif;
  background: #1a1a1a;
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}
h1 { margin: 10px 0; color: #ff4757; flex-shrink: 0; }

#join {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 12px;
  width: 100%;
}
#join input {
  padding: 10px;
  border: none;
  border-radius: 5px;
  background: #444;
  color: #fff;
  width: 280px;
  font-size: 15px;
}
#join button {
  padding: 10px 28px;
  border: none;
  border-radius: 5px;
  background: #ff4757;
  color: #fff;
  cursor: pointer;
  font-size: 15px;
}
#join-err { color: #ff7d7d; font-size: 0.85em; min-height: 18px; }

#chat {
  display: none;
  flex-direction: column;
  width: 100%;
  max-width: 540px;
  flex: 1;
  min-height: 0;
  position: relative;
}
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 12px;
  flex-shrink: 0;
  border-bottom: 1px solid #2a2a2a;
  gap: 8px;
}
#room-title { font-weight: bold; font-size: 0.95em; color: #ccc; flex: 1; }
#conn-pill {
  font-size: 0.72em;
  padding: 2px 10px;
  border-radius: 10px;
  background: #333;
  color: #ffd97d;
}
#conn-pill.ok  { color: #7dffaa; }
#conn-pill.err { color: #ff7d7d; }

#users-btn {
  background: #333;
  border: none;
  color: #fff;
  padding: 4px 10px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 14px;
  white-space: nowrap;
}
#users-btn:hover { background: #444; }

/* Users panel dropdown */
#users-panel {
  display: none;
  position: absolute;
  top: 42px;
  right: 12px;
  background: #2a2a2a;
  border: 1px solid #3a3a3a;
  border-radius: 8px;
  padding: 10px 14px;
  min-width: 180px;
  z-index: 100;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
#users-panel.open { display: block; }
#users-panel h3 {
  font-size: 0.8em;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 8px;
}
#users-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
#users-list li {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.9em;
}
#users-list li .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #7dffaa;
  flex-shrink: 0;
}
#users-list li .uname { color: #ddd; }
#users-list li .you { font-size: 0.75em; color: #666; }

#messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 5px;
  min-height: 0;
}
.msg {
  max-width: 72%;
  padding: 8px 12px;
  border-radius: 10px;
  word-break: break-word;
  font-size: 0.95em;
  line-height: 1.4;
}
.msg .name { font-weight: bold; font-size: 0.78em; margin-bottom: 2px; opacity: 0.8; }
.self   { align-self: flex-end;   background: #ff4757; border-bottom-right-radius: 3px; }
.other  { align-self: flex-start; background: #2f2f2f; border-bottom-left-radius: 3px; }
.sys    { align-self: center; color: #555; font-size: 0.78em; font-style: italic; background: transparent; }
.admin  { align-self: center; color: #ffd97d; font-size: 0.78em; font-style: italic; background: transparent; }

#typing {
  height: 18px;
  font-size: 0.78em;
  color: #666;
  padding: 0 12px;
  flex-shrink: 0;
  font-style: italic;
}
#input-row {
  display: flex;
  padding: 10px 12px;
  gap: 8px;
  flex-shrink: 0;
  border-top: 1px solid #2a2a2a;
}
#input-row input {
  flex: 1;
  padding: 10px 14px;
  border: none;
  border-radius: 20px;
  background: #333;
  color: #fff;
  font-size: 14px;
  outline: none;
}
#input-row input:disabled { opacity: 0.4; }
#input-row button {
  padding: 10px 18px;
  border: none;
  border-radius: 20px;
  background: #ff4757;
  color: #fff;
  cursor: pointer;
  font-size: 14px;
}
#input-row button:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>

<h1>Ligma Chat 💬</h1>

<div id="join">
  <input id="u-input" placeholder="Username" maxlength="24">
  <input id="r-input" placeholder="Room code" maxlength="32" value="general">
  <button id="join-btn">Join Room</button>
  <div id="join-err"></div>
</div>

<div id="chat">
  <div class="top-bar">
    <div id="room-title"></div>
    <div id="conn-pill">connecting…</div>
    <button id="users-btn">👥 Users <span id="user-count"></span></button>
  </div>

  <!-- Users dropdown panel -->
  <div id="users-panel">
    <h3>Online now</h3>
    <ul id="users-list"></ul>
  </div>

  <div id="messages"></div>
  <div id="typing"></div>
  <div id="input-row">
    <input id="msg-input" autocomplete="off" placeholder="Message…" disabled maxlength="500">
    <button id="send-btn" disabled>Send</button>
  </div>
</div>

<script>
const FB         = 'https://ligma--chat-default-rtdb.firebaseio.com'
const ADMIN_NAME = 'Admin:Liam'

let username, room
let muted = false
let msgListener, cmdListener, typingListener
let typingTimer, presenceTimer
let onlineUsers = {}

const joinDiv     = document.getElementById('join')
const chatDiv     = document.getElementById('chat')
const uInput      = document.getElementById('u-input')
const rInput      = document.getElementById('r-input')
const joinBtn     = document.getElementById('join-btn')
const joinErr     = document.getElementById('join-err')
const roomTitle   = document.getElementById('room-title')
const connPill    = document.getElementById('conn-pill')
const usersBtn    = document.getElementById('users-btn')
const usersPanel  = document.getElementById('users-panel')
const usersList   = document.getElementById('users-list')
const userCount   = document.getElementById('user-count')
const messagesDiv = document.getElementById('messages')
const typingDiv   = document.getElementById('typing')
const msgInput    = document.getElementById('msg-input')
const sendBtn     = document.getElementById('send-btn')

// Toggle users panel
usersBtn.onclick = () => usersPanel.classList.toggle('open')

// Close panel if clicking outside
document.addEventListener('click', e => {
  if (!usersPanel.contains(e.target) && e.target !== usersBtn) {
    usersPanel.classList.remove('open')
  }
})

// ── Firebase REST ──
const fb     = p => `${FB}/${p}.json`
const fbPost = (p, d) => fetch(fb(p), { method: 'POST',   body: JSON.stringify(d) }).then(r => r.json())
const fbSet  = (p, d) => fetch(fb(p), { method: 'PUT',    body: JSON.stringify(d) })
const fbDel  = p      => fetch(fb(p), { method: 'DELETE' })
const fbGet  = p      => fetch(fb(p)).then(r => r.json())

// ── SSE ──
function fbListen(path, cb) {
  const es = new EventSource(fb(path))
  es.addEventListener('put',   e => { try { cb(JSON.parse(e.data)) } catch {} })
  es.addEventListener('patch', e => { try { cb(JSON.parse(e.data)) } catch {} })
  es.onopen  = () => { connPill.textContent = 'connected';     connPill.className = 'ok';  msgInput.disabled = false; sendBtn.disabled = false }
  es.onerror = () => { connPill.textContent = 'reconnecting…'; connPill.className = 'err'; msgInput.disabled = true;  sendBtn.disabled = true  }
  return es
}

// ── Messages ──
const seen = new Set()
function addMsg(u, text, cls, id) {
  if (id && seen.has(id)) return
  if (id) seen.add(id)
  const d = document.createElement('div')
  d.className = 'msg ' + cls
  if (cls === 'self' || cls === 'other') {
    const n = document.createElement('div')
    n.className = 'name'
    n.textContent = u
    d.appendChild(n)
  }
  const b = document.createElement('div')
  b.textContent = text
  d.appendChild(b)
  messagesDiv.appendChild(d)
  messagesDiv.scrollTop = messagesDiv.scrollHeight
}

// ── Presence / users panel ──
async function refreshPresence() {
  const data = await fbGet(`rooms/${room}/presence`)
  onlineUsers = {}
  if (data) {
    const now = Date.now()
    Object.values(data)
      .filter(u => now - u.ts < 15000)
      .forEach(u => { onlineUsers[u.name] = u })
  }
  renderUsersPanel()
}

function renderUsersPanel() {
  const names = Object.keys(onlineUsers)
  userCount.textContent = names.length ? `(${names.length})` : ''
  usersList.innerHTML = ''
  names.forEach(name => {
    const li = document.createElement('li')
    li.innerHTML = `
      <span class="dot"></span>
      <span class="uname">${name}</span>
      ${name === username ? '<span class="you">(you)</span>' : ''}
    `
    usersList.appendChild(li)
  })
  if (!names.length) {
    const li = document.createElement('li')
    li.style.color = '#555'
    li.style.fontSize = '0.85em'
    li.textContent = 'Nobody else here yet'
    usersList.appendChild(li)
  }
}

// ── Typing ──
async function renderTyping() {
  const data = await fbGet(`rooms/${room}/typing`)
  if (!data) { typingDiv.textContent = ''; return }
  const now = Date.now()
  const who = Object.entries(data)
    .filter(([u, ts]) => u !== username && now - ts < 3000)
    .map(([u]) => u)
  typingDiv.textContent = who.length
    ? who.join(', ') + (who.length === 1 ? ' is typing…' : ' are typing…')
    : ''
}

// ── Admin commands ──
function listenForCommands() {
  cmdListener = fbListen(`rooms/${room}/commands/${username}`, ({ data }) => {
    if (!data || !data.cmd) return
    const { cmd, by } = data
    if (cmd === 'kick') {
      alert(`You were kicked by ${by}`)
      fbDel(`rooms/${room}/commands/${username}`)
      location.reload()
    }
    if (cmd === 'mute') {
      muted = true
      addMsg('', `You were muted by ${by}`, 'admin')
      fbDel(`rooms/${room}/commands/${username}`)
    }
    if (cmd === 'unmute') {
      muted = false
      addMsg('', `You were unmuted by ${by}`, 'admin')
      fbDel(`rooms/${room}/commands/${username}`)
    }
  })
}

async function runAdminCommand(cmd, target) {
  await fbSet(`rooms/${room}/commands/${target}`, { cmd, by: username, ts: Date.now() })
  addMsg('', `⚡ Admin: /${cmd} → ${target}`, 'admin')
}

// ── JOIN ──
joinBtn.onclick = async () => {
  username = uInput.value.trim() || 'Anon'
  room     = rInput.value.trim().replace(/[^a-z0-9_-]/gi, '-').toLowerCase() || 'general'

  joinBtn.disabled    = true
  joinBtn.textContent = 'Connecting…'
  joinErr.textContent = ''

  try {
    const r = await fetch(fb(`rooms/${room}/ping`))
    if (!r.ok) throw new Error('HTTP ' + r.status)
  } catch (e) {
    joinErr.textContent = 'Cannot reach Firebase: ' + e.message
    joinBtn.disabled    = false
    joinBtn.textContent = 'Join Room'
    return
  }

  joinDiv.style.display = 'none'
  chatDiv.style.display = 'flex'
  roomTitle.textContent = '#' + room + (username === ADMIN_NAME ? ' 👑' : '')

  // Load history
  const existing = await fbGet(`rooms/${room}/messages`)
  if (existing) {
    Object.entries(existing)
      .sort((a, b) => (a[1].ts || 0) - (b[1].ts || 0))
      .forEach(([id, m]) => addMsg(m.u, m.t, m.u === username ? 'self' : 'other', id))
  }

  // Live streams
  msgListener     = fbListen(`rooms/${room}/messages`, ({ data }) => {
    if (!data) return
    const entries = typeof data === 'object' && !data.u ? Object.entries(data) : [[null, data]]
    entries.forEach(([id, m]) => {
      if (m && m.u && m.t) addMsg(m.u, m.t, m.u === username ? 'self' : 'other', id)
    })
  })
  typingListener  = fbListen(`rooms/${room}/typing`, () => renderTyping())
  listenForCommands()

  // Presence
  const updatePresence = () => fbSet(`rooms/${room}/presence/${username}`, { name: username, ts: Date.now() })
  await updatePresence()
  await refreshPresence()
  presenceTimer = setInterval(() => {
    updatePresence()
    refreshPresence()
    renderTyping()
  }, 8000)

  addMsg('', 'You joined #' + room, 'sys')
  if (username === ADMIN_NAME) addMsg('', 'Admin commands: /kick /mute /unmute <username>', 'admin')
  msgInput.focus()
}

// ── TYPING ──
msgInput.addEventListener('input', () => {
  fbSet(`rooms/${room}/typing/${username}`, Date.now())
  clearTimeout(typingTimer)
  typingTimer = setTimeout(() => fbDel(`rooms/${room}/typing/${username}`), 2500)
})

// ── SEND ──
async function sendMessage() {
  const text = msgInput.value.trim()
  if (!text) return
  msgInput.value = ''
  clearTimeout(typingTimer)
  fbDel(`rooms/${room}/typing/${username}`)

  if (text.startsWith('/') && username === ADMIN_NAME) {
    const parts = text.slice(1).split(' ')
    const cmd   = parts[0].toLowerCase()
    const target = parts.slice(1).join(' ').trim()
    if (!target) { addMsg('', 'Usage: /kick /mute /unmute <username>', 'admin'); return }
    if (!['kick','mute','unmute'].includes(cmd)) { addMsg('', 'Unknown command. Use /kick /mute /unmute', 'admin'); return }
    await runAdminCommand(cmd, target)
    return
  }

  if (muted) { addMsg('', 'You are muted.', 'sys'); return }

  await fbPost(`rooms/${room}/messages`, { u: username, t: text, ts: Date.now() })
}

sendBtn.onclick = sendMessage
msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage() }
})

// ── LEAVE ──
window.addEventListener('beforeunload', () => {
  fbDel(`rooms/${room}/presence/${username}`)
  fbDel(`rooms/${room}/typing/${username}`)
  clearInterval(presenceTimer)
  msgListener?.close()
  cmdListener?.close()
  typingListener?.close()
})

uInput.focus()
</script>
</body>
</html>
