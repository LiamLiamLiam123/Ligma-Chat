<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ligma Chat</title>

<style>
body {
  margin:0;
  font-family:Arial,sans-serif;
  background:#1a1a1a;
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  height:100vh;
}
h1{margin:10px 0;color:#ff4757}

#join{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:10px;
}
#join input{
  padding:10px;
  border:none;
  border-radius:5px;
  background:#444;
  color:#fff;
  width:260px;
}
#join button{
  padding:10px 20px;
  border:none;
  border-radius:5px;
  background:#ff4757;
  color:#fff;
  cursor:pointer;
}

#chat{
  display:none;
  flex-direction:column;
  width:100%;
  max-width:520px;
  flex:1;
}

.top-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:6px 10px;
}
#room-title{color:#ff4757;font-weight:bold}
#users-btn{
  background:#333;
  color:#fff;
  border:none;
  border-radius:5px;
  padding:4px 8px;
  cursor:pointer;
}

#users-panel{
  display:none;
  background:#222;
  border-radius:6px;
  margin:0 10px 6px;
  padding:6px;
  font-size:.85em;
}

#messages{
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:6px;
}

.message{
  max-width:70%;
  padding:8px 12px;
  border-radius:8px;
  word-break:break-word;
}
.self{align-self:flex-end;background:#ff4757}
.other{align-self:flex-start;background:#2f2f2f}
.system{
  align-self:center;
  font-size:.8em;
  color:#aaa;
}

#typing{
  height:18px;
  font-size:.8em;
  color:#aaa;
  padding-left:10px;
}

form{
  display:flex;
  padding:10px;
}
form input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:5px;
  background:#444;
  color:#fff;
}
form button{
  margin-left:6px;
  padding:10px 16px;
  border:none;
  border-radius:5px;
  background:#ff4757;
  color:#fff;
  cursor:pointer;
}
</style>
</head>

<body>
<h1>Ligma Chat 💬</h1>

<div id="join">
  <input id="username-input" placeholder="Username">
  <input id="room-input" placeholder="Room code">
  <button id="join-btn">Join</button>
</div>

<div id="chat">
  <div class="top-bar">
    <div id="room-title"></div>
    <button id="users-btn">👥</button>
  </div>
  <div id="users-panel"><b>Online</b><ul id="users-list"></ul></div>
  <div id="messages"></div>
  <div id="typing"></div>
  <form id="chat-form">
    <input id="message-input" autocomplete="off" placeholder="Message">
    <button>Send</button>
  </form>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  'https://bkcpyunpeyjxzcdgrhcl.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJrY3B5dW5wZXlqeHpjZGdyaGNsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjYyMDE2NzcsImV4cCI6MjA4MTc3NzY3N30.BBpncWn_U4zR40iTEDiypT7zFzhFx_VjjefxXVhOEyI'
)

const ADMIN_NAME = "Admin: Liam"

let username, room
let mutedUsers = new Set()
let adminChannel

const messagesDiv = document.getElementById('messages')
const messageInput = document.getElementById('message-input')
const chatForm = document.getElementById('chat-form')

function systemMsg(text){
  const d=document.createElement('div')
  d.className='system'
  d.textContent=text
  messagesDiv.appendChild(d)
}

function addMessage(msg){
  const d=document.createElement('div')
  d.className='message '+(msg.username===username?'self':'other')
  d.innerHTML=`<b>${msg.username}</b>: ${msg.message}`
  messagesDiv.appendChild(d)
  messagesDiv.scrollTop=messagesDiv.scrollHeight
}

function setupAdmin(){
  adminChannel = supabase.channel('admin-'+room)

  adminChannel.on('broadcast',{event:'kick'},({payload})=>{
    if(payload.target===username){
      alert('You were kicked by admin')
      location.reload()
    }
  })

  adminChannel.on('broadcast',{event:'mute'},({payload})=>{
    if(payload.target===username){
      mutedUsers.add(username)
      systemMsg('You were muted by admin')
    }
  })

  adminChannel.on('broadcast',{event:'unmute'},({payload})=>{
    if(payload.target===username){
      mutedUsers.delete(username)
      systemMsg('You were unmuted by admin')
    }
  })

  adminChannel.subscribe()
}

function handleCommand(text){
  if(username!==ADMIN_NAME) return false

  const [cmd,target]=text.split(' ')
  if(!target) return true

  if(cmd==='/kick'){
    adminChannel.send({type:'broadcast',event:'kick',payload:{target}})
    systemMsg(`Admin kicked ${target}`)
  }

  if(cmd==='/mute'){
    adminChannel.send({type:'broadcast',event:'mute',payload:{target}})
    systemMsg(`Admin muted ${target}`)
  }

  if(cmd==='/unmute'){
    adminChannel.send({type:'broadcast',event:'unmute',payload:{target}})
    systemMsg(`Admin unmuted ${target}`)
  }

  return true
}

chatForm.onsubmit = async e=>{
  e.preventDefault()
  const text=messageInput.value
  messageInput.value=''

  if(text.startsWith('/')){
    if(handleCommand(text)) return
  }

  if(mutedUsers.has(username)){
    systemMsg('You are muted')
    return
  }

  const {data}=await supabase.from('messages').insert([{
    room_code:room,
    username,
    message:text
  }]).select()

  addMessage(data[0])
}

document.getElementById('join-btn').onclick=()=>{
  username=document.getElementById('username-input').value||'Anon'
  room=document.getElementById('room-input').value
  document.getElementById('join').style.display='none'
  document.getElementById('chat').style.display='flex'
  document.getElementById('room-title').textContent='Room: '+room
  setupAdmin()
}
</script>
</body>
</html>
